<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品登録・編集 — 委託販売管理システム</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* =============================
       商品登録・編集 固有スタイル
       ============================= */

    /* 基本情報フォーム */
    .basic-form {
      display:               grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:                   0 var(--spacing-lg);
    }

    /* 色あり/色なし トグル */
    .type-toggle {
      display:       flex;
      gap:           var(--spacing-lg);
      align-items:   center;
      margin-bottom: var(--spacing-md);
    }

    .type-toggle label {
      display:     flex;
      align-items: center;
      gap:         var(--spacing-xs);
      font-size:   var(--font-size-sm);
      cursor:      pointer;
    }

    .type-toggle input {
      width:  16px;
      height: 16px;
      cursor: pointer;
    }

    /* 色チェックボックス一覧 */
    .color-grid {
      display:               grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap:                   var(--spacing-sm) var(--spacing-md);
      margin-top:            var(--spacing-sm);
    }

    .color-grid label {
      display:     flex;
      align-items: center;
      gap:         var(--spacing-xs);
      font-size:   var(--font-size-sm);
      cursor:      pointer;
    }

    .color-grid input {
      width:  18px;
      height: 18px;
      cursor: pointer;
    }

    /* 保存エリア */
    .save-bar {
      display:         flex;
      justify-content: flex-end;
      align-items:     center;
      gap:             var(--spacing-md);
      margin-top:      var(--spacing-lg);
      padding-top:     var(--spacing-lg);
      border-top:      0.5px solid var(--color-border);
    }
  </style>
</head>
<body>

<div class="app-layout">

  <!-- サイドバー -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 6l4-2 2 2a3 3 0 0 0 6 0l2-2 4 2-2 4h-2v8H7v-8H5L3 6z"/>
        </svg>
      </div>
      <span class="sidebar-logo-text">委託販売<br>管理システム</span>
    </div>

    <span class="nav-section-label">メイン</span>
    <a class="nav-item" href="dashboard.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      ダッシュボード
    </a>

    <span class="nav-section-label">マスタ</span>
    <a class="nav-item" href="client.html">
      <svg viewBox="0 0 24 24"><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      取引先
    </a>
    <a class="nav-item active" href="product.html">
      <svg viewBox="0 0 24 24"><path d="M3 6l4-2 2 2a3 3 0 0 0 6 0l2-2 4 2-2 4h-2v8H7v-8H5L3 6z"/></svg>
      商品
    </a>
    <a class="nav-item" href="color.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M3 12h3m12 0h3M12 3v3m0 12v3"/></svg>
      色
    </a>

    <span class="nav-section-label">業務</span>
    <a class="nav-item" href="delivery.html">
      <svg viewBox="0 0 24 24"><path d="M5 8h14M5 12h14M5 16h6"/><rect x="3" y="4" width="18" height="16" rx="2"/></svg>
      納品登録
    </a>
    <a class="nav-item" href="delivery-history.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      納品履歴
    </a>
    <a class="nav-item" href="sales-report.html">
      <svg viewBox="0 0 24 24"><path d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm0 4h12M10 4v4"/></svg>
      売上報告入力
    </a>
    <a class="nav-item" href="sales-report-history.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      売上報告履歴
    </a>

    <span class="nav-section-label">設定</span>
    <a class="nav-item" href="users.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      ユーザー管理
    </a>

    <div style="margin-top:auto; padding:var(--spacing-lg); border-top:0.5px solid var(--color-border);">
      <div class="flex-center gap-sm">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--color-accent-light);display:flex;align-items:center;justify-content:center;font-size:var(--font-size-sm);font-weight:500;color:var(--color-accent);flex-shrink:0;">山</div>
        <div>
          <div style="font-size:var(--font-size-sm);font-weight:500;">山田 花子</div>
          <a href="login.html" style="font-size:var(--font-size-xs);color:var(--color-text-muted);">ログアウト</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <main class="main-content">

    <div class="page-header">
      <h1 class="page-title">商品編集</h1>
      <p class="page-subtitle">商品情報を編集します</p>
    </div>

    <!-- 基本情報 -->
    <div class="card mb-lg">
      <div class="card-title">基本情報</div>
      <div class="basic-form">
        <div class="form-group">
          <label class="form-label" for="product-name">品名</label>
          <input class="form-input" type="text" id="product-name" value="山菜図鑑Tシャツ" />
        </div>
        <div class="form-group">
          <label class="form-label" for="retail-price">上代</label>
          <input class="form-input" type="number" id="retail-price" value="3000" />
        </div>
        <div class="form-group">
          <label class="form-label" for="commission-rate">掛け率（標準値）</label>
          <input class="form-input" type="number" id="commission-rate" step="0.01" min="0" max="1" value="0.75" />
        </div>
      </div>
    </div>

    <!-- 色 -->
    <div class="card">
      <div class="card-title">色のバリエーション</div>

      <div class="type-toggle">
        <label><input type="radio" name="color-type" checked /> 色のバリエーションがある</label>
        <label><input type="radio" name="color-type" /> 色なし（単一商品として登録）</label>
      </div>

      <p class="text-muted text-sm mb-md">チェックした色ごとに、上記の品名・上代・掛け率を共通の値として商品（Product）が登録されます。「色なし」を選択した場合、この色一覧は非表示になり、色を持たない単一商品として登録されます（トートバッグ・手ぬぐい等）。</p>

      <div class="color-grid">
        <label><input type="checkbox" checked /> 白</label>
        <label><input type="checkbox" checked /> 黒</label>
        <label><input type="checkbox" checked /> アッシュ</label>
        <label><input type="checkbox" checked /> インディゴ</label>
        <label><input type="checkbox" /> グレー</label>
        <label><input type="checkbox" /> 黄</label>
      </div>

      <!-- 保存エリア -->
      <div class="save-bar">
        <a href="product.html" class="btn btn-secondary">キャンセル</a>
        <button class="btn btn-primary">保存する</button>
      </div>
    </div>

  </main>
</div>

</body>
</html>
